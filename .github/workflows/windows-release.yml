name: Build Windows Release Artifact

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is not reachable from main."
            exit 1
          fi

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build win-x64 release
        run: cargo build --release --locked

      - name: Prepare release artifact directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "publish/win-x64" -Force | Out-Null
          Copy-Item "target/release/whoamenu.exe" "publish/win-x64/whoamenu.exe" -Force

      - name: Create zip archive
        shell: pwsh
        run: |
          $zipName = "whoamenu-${{ github.ref_name }}-win-x64.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipName

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: whoamenu-${{ github.ref_name }}-win-x64
          path: whoamenu-${{ github.ref_name }}-win-x64.zip
